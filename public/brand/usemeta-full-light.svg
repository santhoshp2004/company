<?xml version="1.0" encoding="UTF-8"?>
<!-- USEMETA — Full logo, light theme (white background) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" fill="none" role="img" aria-label="USEMETA logo light">
  <defs>
    <linearGradient id="lp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="55%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="lg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- White card background -->
  <rect width="380" height="100" rx="16" fill="#FFFFFF"/>

  <!-- Light card border -->
  <rect x="0.5" y="0.5" width="379" height="99" rx="15.5"
        stroke="#E2E8F0" stroke-width="1" fill="none"/>

  <!-- Icon background (dark pill on light) -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#0F172A"/>

  <!-- Orbital rings — same geometry as icon version -->
  <circle cx="50" cy="50" r="32"
          stroke="url(#lp)" stroke-width="1.6"
          stroke-dasharray="140 65" stroke-dashoffset="25"
          stroke-linecap="round" opacity="0.35" filter="url(#lg)"/>
  <ellipse cx="50" cy="50" rx="32" ry="15"
           stroke="url(#lp)" stroke-width="1.6"
           stroke-dasharray="118 84" stroke-dashoffset="-8"
           stroke-linecap="round" opacity="0.55"
           transform="rotate(-35 50 50)" filter="url(#lg)"/>
  <ellipse cx="50" cy="50" rx="32" ry="15"
           stroke="url(#lp)" stroke-width="1.6"
           stroke-dasharray="100 102" stroke-dashoffset="18"
           stroke-linecap="round" opacity="0.55"
           transform="rotate(35 50 50)" filter="url(#lg)"/>

  <!-- S-curve -->
  <path d="M 56 25 C 65 25, 70 32, 64 38 C 58 44, 42 44, 36 50 C 30 56, 35 68, 44 70"
        stroke="url(#lp)" stroke-width="2.6" stroke-linecap="round"
        fill="none" filter="url(#lg)" opacity="0.92"/>

  <!-- Core + nodes -->
  <circle cx="50" cy="50" r="5.5" fill="url(#lp)" filter="url(#lg)"/>
  <circle cx="50" cy="50" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="50" cy="18.5" r="3.2" fill="#3B82F6" opacity="0.9"/>
  <circle cx="72" cy="63"   r="3.2" fill="#8B5CF6" opacity="0.9"/>
  <circle cx="28" cy="63"   r="3.2" fill="#06B6D4" opacity="0.9"/>

  <!-- Spokes -->
  <line x1="50" y1="44.5" x2="50" y2="21.7" stroke="url(#lp)" stroke-width="1" opacity="0.35"/>
  <line x1="54"  y1="53.5" x2="69.5" y2="61.5" stroke="url(#lp)" stroke-width="1" opacity="0.35"/>
  <line x1="46"  y1="53.5" x2="31" y2="61.5"   stroke="url(#lp)" stroke-width="1" opacity="0.35"/>

  <!-- ── Wordmark (dark on light) ── -->
  <!-- U -->
  <path d="M 116 28 L 116 58 Q 116 72 128 72 Q 140 72 140 58 L 140 28"
        stroke="#0F172A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- S -->
  <path d="M 176 36 C 170 30, 158 30, 158 42 C 158 50, 170 52, 174 58
           C 178 64, 172 72, 162 72 C 156 72, 152 69, 150 66"
        stroke="#0F172A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- E -->
  <path d="M 186 28 L 186 72 M 186 28 L 206 28 M 186 50 L 202 50 M 186 72 L 206 72"
        stroke="#0F172A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- M -->
  <path d="M 214 72 L 214 28 L 228 58 L 242 28 L 242 72"
        stroke="#0F172A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- E -->
  <path d="M 252 28 L 252 72 M 252 28 L 272 28 M 252 50 L 268 50 M 252 72 L 272 72"
        stroke="#0F172A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- T -->
  <path d="M 280 28 L 306 28 M 293 28 L 293 72"
        stroke="#0F172A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- A -->
  <path d="M 314 72 L 328 28 L 342 72 M 319 56 L 337 56"
        stroke="#0F172A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Gradient underline -->
  <rect x="116" y="78" width="226" height="3" rx="1.5" fill="url(#lp)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="116" y="95" font-family="system-ui, -apple-system, sans-serif"
        font-size="9" font-weight="600" letter-spacing="3"
        fill="#64748B" opacity="0.9">
    TRANSFORM IDEAS INTO DIGITAL REALITY
  </text>
</svg>
