<?xml version="1.0" encoding="UTF-8"?>
<!-- USEMETA — Favicon (32×32 equivalent, scalable) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="USEMETA favicon">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="55%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="fbg" cx="40%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <filter id="fglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#fbg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5"
        stroke="url(#fg)" stroke-width="0.5" opacity="0.3" fill="none"/>

  <!-- Compact orbital system scaled to 32px -->
  <circle cx="16" cy="16" r="11"
          stroke="url(#fg)" stroke-width="0.8"
          stroke-dasharray="48 24" stroke-dashoffset="10"
          stroke-linecap="round" opacity="0.35"/>
  <ellipse cx="16" cy="16" rx="11" ry="5"
           stroke="url(#fg)" stroke-width="0.8"
           stroke-dasharray="42 28" stroke-dashoffset="-3"
           stroke-linecap="round" opacity="0.6"
           transform="rotate(-35 16 16)"/>
  <ellipse cx="16" cy="16" rx="11" ry="5"
           stroke="url(#fg)" stroke-width="0.8"
           stroke-dasharray="36 34" stroke-dashoffset="6"
           stroke-linecap="round" opacity="0.6"
           transform="rotate(35 16 16)"/>

  <!-- S-curve simplified for small size -->
  <path d="M 18.5 7.5 C 21.5 7.5, 23 10, 21 12.5 C 19 15, 13 14.5, 11 17 C 9 19.5, 11 23.5, 14.5 24"
        stroke="url(#fg)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Core dot -->
  <circle cx="16" cy="16" r="2.2" fill="url(#fg)" filter="url(#fglow)"/>
  <circle cx="16" cy="16" r="1"   fill="white" opacity="0.9"/>

  <!-- Nodes -->
  <circle cx="16"  cy="5.5"  r="1.4" fill="#3B82F6" opacity="0.95"/>
  <circle cx="24"  cy="20.5" r="1.4" fill="#8B5CF6" opacity="0.95"/>
  <circle cx="8"   cy="20.5" r="1.4" fill="#06B6D4" opacity="0.95"/>
</svg>
